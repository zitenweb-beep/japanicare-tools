<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS投稿ジェネレーター | JAPANICARE</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:#F5F5F7;
    min-height:100vh;
    padding:32px 16px 80px;
    color:#1D1D1F;
  }
  .wrap{max-width:680px;margin:0 auto}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .brand{font-size:20px;font-weight:700;letter-spacing:-0.01em}
  .brand-sub{font-size:13px;color:#86868B;font-weight:400;margin-left:8px}
  .back{font-size:13px;color:#6E6E73;text-decoration:none;padding:8px 16px;border:1px solid #D2D2D7;border-radius:9999px;transition:.2s}
  .back:hover{background:#fff;border-color:#86868B}

  /* Title card */
  .title-card{background:#fff;border:1px solid #E8E8ED;border-radius:16px;padding:28px 24px;margin-bottom:20px}
  h1{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.01em}
  .lead{font-size:13px;color:#6E6E73;line-height:1.7}

  /* Sections */
  .card{background:#fff;border:1px solid #E8E8ED;border-radius:16px;padding:22px 22px;margin-bottom:16px}
  h2{font-size:13px;font-weight:600;color:#86868B;letter-spacing:0.04em;margin-bottom:14px;text-transform:uppercase}

  /* Platform toggle */
  .toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .toggle button{
    background:#F5F5F7;color:#6E6E73;border:1px solid #E8E8ED;border-radius:10px;
    padding:14px 0;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;
    font-family:inherit;letter-spacing:.05em;
  }
  .toggle button:hover{border-color:#B0C4D8}
  .toggle button.active{background:#E8F0FE;color:#0071E3;border-color:#0071E3;font-weight:600}

  /* Themes */
  .themes{display:flex;flex-direction:column;gap:8px}
  .theme{
    display:grid;grid-template-columns:88px 1fr auto;align-items:center;gap:12px;
    padding:14px 16px;background:#F5F5F7;border:1px solid transparent;border-radius:10px;
    cursor:pointer;transition:.15s;
  }
  .theme:hover{background:#EDEEF0}
  .theme.selected{background:#E8F0FE;border-color:#0071E3}
  .theme .tag{font-size:11px;color:#86868B;font-weight:600;letter-spacing:.1em;border-right:1px solid #D2D2D7;padding-right:12px}
  .theme .title{font-size:14px;color:#1D1D1F;font-weight:500}
  .theme .check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D2D2D7;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .theme.selected .tag{color:#0071E3}
  .theme.selected .check{border-color:#0071E3;background:#0071E3}
  .theme.selected .check::after{content:"";width:5px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-bottom:2px}

  /* Inputs */
  textarea,input[type="text"]{
    width:100%;background:#F5F5F7;border:1px solid #E8E8ED;border-radius:10px;
    color:#1D1D1F;padding:14px;font-size:14px;line-height:1.7;
    font-family:inherit;resize:vertical;transition:.15s;
  }
  textarea:focus,input:focus{outline:none;border-color:#0071E3;background:#fff}
  textarea::placeholder,input::placeholder{color:#9999A0}
  input[readonly]{background:#F5F5F7;color:#6E6E73}

  .label-small{font-size:12px;color:#86868B;margin-bottom:8px;font-weight:500}
  .mt{margin-top:16px}

  /* Generate button */
  .generate{
    display:block;width:100%;margin-top:20px;padding:18px;
    background:#0071E3;border:none;border-radius:14px;color:#fff;
    font-size:15px;font-weight:600;letter-spacing:.1em;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .generate:hover:not(:disabled){background:#0055B3}
  .generate:active{transform:scale(.99)}
  .generate:disabled{background:#B0C4D8;cursor:not-allowed}

  /* Loading */
  .loading{
    display:none;align-items:center;gap:12px;padding:20px;
    background:#F0F5FF;border:1px solid #D0E2FF;border-radius:12px;
    color:#0071E3;font-size:14px;margin-top:20px;
  }
  .loading.visible{display:flex}
  .spinner{
    width:18px;height:18px;border:2px solid #D0E2FF;border-top-color:#0071E3;
    border-radius:50%;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Error */
  .error{
    display:none;padding:16px;margin-top:20px;
    background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;
    color:#B91C1C;font-size:13px;line-height:1.6;
  }
  .error.visible{display:block}

  /* Results */
  .results{display:none;margin-top:20px;flex-direction:column;gap:12px}
  .results.visible{display:flex}
  .post-card{
    background:#fff;border:1px solid #E8E8ED;border-radius:14px;padding:18px 18px;
  }
  .post-head{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  }
  .post-num{
    font-size:12px;font-weight:700;color:#0071E3;letter-spacing:.1em;
    background:#E8F0FE;padding:4px 10px;border-radius:9999px;
  }
  .post-count{font-size:12px;color:#86868B;font-weight:500}
  .post-count.over{color:#B91C1C;font-weight:600}
  .post-body{
    font-size:14px;line-height:1.85;color:#1D1D1F;white-space:pre-wrap;
    word-break:break-word;padding:12px 0;border-top:1px solid #F0F0F3;border-bottom:1px solid #F0F0F3;margin-bottom:12px;
  }
  .post-actions{display:flex;gap:8px}
  .btn-sub{
    background:#fff;border:1px solid #D2D2D7;border-radius:9999px;
    padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;
    color:#1D1D1F;font-family:inherit;transition:.15s;
  }
  .btn-sub:hover{border-color:#0071E3;color:#0071E3}
  .btn-sub.copied{background:#E8F0FE;border-color:#0071E3;color:#0071E3}

  .regen{
    display:none;width:100%;margin-top:4px;padding:14px;
    background:#fff;border:1px solid #D2D2D7;border-radius:12px;
    font-size:13px;font-weight:500;color:#6E6E73;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .regen:hover{border-color:#0071E3;color:#0071E3}
  .regen.visible{display:block}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><span class="brand">JAPANICARE</span><span class="brand-sub">SNS投稿ジェネレーター</span></div>
    <a href="/" class="back">← 戻る</a>
  </header>

  <div class="title-card">
    <h1>📣 SNS投稿ジェネレーター</h1>
    <p class="lead">テーマを選ぶか貼り付けてGENERATE。ジャパニケア札幌の思想＋おがっち構文で、X / Threads 投稿案を3つ生成します。</p>
  </div>

  <div class="card">
    <h2>プラットフォーム</h2>
    <div class="toggle" id="toggle">
      <button data-platform="x" class="active">X (Twitter)</button>
      <button data-platform="threads">Threads</button>
    </div>
  </div>

  <div class="card">
    <h2>プリセットテーマ</h2>
    <div class="themes" id="themes">
      <div class="theme" data-theme="哲学">
        <span class="tag">哲学</span>
        <span class="title">ジャパニケア札幌の哲学</span>
        <span class="check"></span>
      </div>
      <div class="theme" data-theme="責任">
        <span class="tag">責任</span>
        <span class="title">B型事業所の職員としての責任</span>
        <span class="check"></span>
      </div>
      <div class="theme" data-theme="生産活動">
        <span class="tag">生産活動</span>
        <span class="title">生産活動と利用者のステップアップ</span>
        <span class="check"></span>
      </div>
      <div class="theme" data-theme="地域">
        <span class="tag">地域</span>
        <span class="title">地域、社会を繋ぐ拠点、居場所</span>
        <span class="check"></span>
      </div>
      <div class="theme" data-theme="やりがい">
        <span class="tag">やりがい</span>
        <span class="title">仕事のやりがい</span>
        <span class="check"></span>
      </div>
    </div>

    <div class="mt">
      <div class="label-small">または貼り付け（自由テーマ・現場エピソード）</div>
      <textarea id="freeText" rows="3" placeholder="伝えたい内容・現場のエピソードを自由に記入（例：今日の利用者Aさんとのやりとり）"></textarea>
    </div>

    <div class="mt">
      <div class="label-small">選択中のテーマ</div>
      <input type="text" id="selected" placeholder="—" readonly>
    </div>

    <button class="generate" id="gen">GENERATE →</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>生成中です。10〜20秒ほどお待ちください。</div>
    </div>

    <div class="error" id="error"></div>
  </div>

  <div class="results" id="results"></div>
  <button class="regen" id="regen">🔄 もう一度生成する（別案）</button>
</div>

<script>
const THEMES = {
  "哲学":{name:"ジャパニケア札幌の哲学",angle:"『全方位全肯定』『福祉をカジュアルに、もっと身近に』『クールでスタイリッシュな福祉』が核。『私たちは障害者とはつきあっていない。おつきあいしているのは一人の人』というフラットな視線。障害者というラベルを無力化したい。『合理的配慮』という言葉が生む分断への違和感。『少しだけやさしくしよう』で十分。「いつかの自分が必要としていた居場所」を作っている（代表はパニック障害当事者）。"},
  "責任":{name:"B型事業所の職員としての責任",angle:"利用者の人生を託されている。『著変なし』という便利な言葉を日報に書かない。体調チェックシート（1日3回、0〜10）で小さな変化をキャッチするプロの仕事。『意向』を尊重し『意思決定』を支援する。正確な情報開示と選択肢の提示が前提。主体性は理念であり設計。『考えざるを得ない構造』をしくみで用意する。人を信じることをあえてしくみに落とし込む覚悟。"},
  "生産活動":{name:"生産活動と利用者のステップアップ",angle:"工賃は『売上 − コスト』。他責にしない。制度のせいにしない。仕事は作れる、マーケット感覚の有無。工程を細分化すれば特性・得意に応じた仕事は必ず作れる（ボトルネック解消）。『現在は存在しない仕事』もプロダクトアウト発想で作れる。脳に汗をかけ。B型事業所は底辺ではない。輝ける場所。選択肢の一つ。工賃規定・在宅就労・着物リメイクなど具体的な仕事もある。"},
  "地域":{name:"地域、社会を繋ぐ拠点、居場所",angle:"マノメオは『いろんな人が集まる場所、多様な価値観が交わる場所』。カフェ・バーを併設した雑貨店という形式で、障害者ラベルを自然に溶かす。『真の支援員はお客様でした』。全国各地の福祉事業所のイケてるアイテムをキュレーション（商品力だけで勝負、同情を誘わない）。ZINE × 福祉。消費が『どこかの知らない誰かさん』の工賃になる設計。みんなでみんなを応援する。"},
  "やりがい":{name:"仕事のやりがい",angle:"代表は現役のパニック障害。『いつかの自分が必要としていた場所』を作っている。利用者から教わることも多い。『私にはできないことが利用者さんにはできる』。凡々たる非凡 — 平凡な1日の積み重ねが非凡を作る。誠実に一歩ずつ。笑顔を増やす仕事。『AIにできないのはリアルでの交流』。感謝の気持ち、誰かの努力の結晶の上に立っている自覚。"}
};
let platform="x",selectedKey="";
const $ = id => document.getElementById(id);

// Toggle
document.querySelectorAll("#toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("#toggle button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    platform = btn.dataset.platform;
  });
});

// Themes
document.querySelectorAll(".theme").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".theme").forEach(x=>x.classList.remove("selected"));
    t.classList.add("selected");
    selectedKey = t.dataset.theme;
    $("selected").value = THEMES[selectedKey].name;
  });
});

// Generate
async function generate(){
  const free = $("freeText").value.trim();
  if(!selectedKey && !free){
    alert("プリセットテーマを選ぶか、自由テーマを入力してください。");
    return;
  }

  // UI reset
  $("error").classList.remove("visible");
  $("results").classList.remove("visible");
  $("regen").classList.remove("visible");
  $("results").innerHTML = "";
  $("loading").classList.add("visible");
  $("gen").disabled = true;
  $("gen").textContent = "生成中...";

  const payload = {
    platform: platform,
    theme_name: selectedKey ? THEMES[selectedKey].name : "",
    theme_angle: selectedKey ? THEMES[selectedKey].angle : "",
    free_text: free
  };

  try{
    const res = await fetch("/post-generator/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "生成に失敗しました");
    }

    renderResults(data.posts || []);
  }catch(e){
    $("error").textContent = "⚠️ " + (e.message || "エラーが発生しました。時間をおいて再試行してください。");
    $("error").classList.add("visible");
  }finally{
    $("loading").classList.remove("visible");
    $("gen").disabled = false;
    $("gen").textContent = "GENERATE →";
  }
}

function renderResults(posts){
  const container = $("results");
  container.innerHTML = "";

  posts.forEach((p, i) => {
    const text = p.text || "";
    const count = p.char_count || text.length;
    const limit = platform === "x" ? 150 : 240;
    const overClass = count > limit ? "over" : "";

    const card = document.createElement("div");
    card.className = "post-card";
    card.innerHTML = `
      <div class="post-head">
        <span class="post-num">案${i+1}</span>
        <span class="post-count ${overClass}">${count}字</span>
      </div>
      <div class="post-body"></div>
      <div class="post-actions">
        <button class="btn-sub copy-one">📋 コピー</button>
      </div>
    `;
    card.querySelector(".post-body").textContent = text;
    card.querySelector(".copy-one").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(text);
        const btn = card.querySelector(".copy-one");
        btn.textContent = "✓ コピー済み";
        btn.classList.add("copied");
        setTimeout(()=>{btn.textContent="📋 コピー";btn.classList.remove("copied");},2000);
      }catch(err){ alert("コピーに失敗しました"); }
    });
    container.appendChild(card);
  });

  container.classList.add("visible");
  $("regen").classList.add("visible");
  container.scrollIntoView({behavior:"smooth", block:"start"});
}

$("gen").addEventListener("click", generate);
$("regen").addEventListener("click", generate);
</script>
</body>
</html>
