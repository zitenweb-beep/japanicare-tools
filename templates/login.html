<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | JAPANICARE 業務ツール</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #F5F5F7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      color: #1D1D1F;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #E8E8ED;
    }
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #1D1D1F;
      letter-spacing: -0.01em;
    }
    .brand-sub {
      font-size: 13px;
      color: #86868B;
      margin-top: 6px;
    }
    .error-box {
      background: #FFEAEA;
      border: 1px solid #FFB8B8;
      color: #CC1818;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1D1D1F;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #D2D2D7;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      color: #1D1D1F;
      background: #FFFFFF;
    }
    input[type="password"]::placeholder {
      color: #86868B;
    }
    input[type="password"]:focus {
      border-color: #0071E3;
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #0071E3;
      color: #FFFFFF;
      border: none;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0077ED; }
    button:active { background: #005BB5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">JAPANICARE</div>
      <div class="brand-sub">業務ツール</div>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="pw">パスワード</label>
      <input type="password" id="pw" name="password" autofocus
             placeholder="事業所パスワードを入力">
      <button type="submit">ログイン</button>
    </form>
  </div>
</body>
</html>
